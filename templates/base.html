<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Learning Studio - EMSI</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%);
            transform: scale(1.02);
        }

        .footer {
            background: rgba(255,255,255,0.9);
            margin-top: auto;
        }

        .feature-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
        }

        .back-home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-home-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .container {
            flex: 1;
        }

        .nav-link.active {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-brain"></i> Deep Learning Studio
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home"></i> Accueil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mlp">
                            <i class="fas fa-chart-line"></i> MLP
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cnn">
                            <i class="fas fa-image"></i> CNN
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/seq2seq">
                            <i class="fas fa-language"></i> Traduction
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/hybrid">
                            <i class="fas fa-brain"></i> Hybride
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/agent">
                            <i class="fas fa-robot"></i> Agent
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bouton retour flottant -->
    <a href="/" class="back-home-btn">
        <i class="fas fa-home"></i> Retour à l'accueil
    </a>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-5 py-3">
        <div class="container text-center">
            <span class="text-muted">
                <i class="fas fa-graduation-cap"></i> Projet Deep Learning - EMSI Casablanca 2025-2026
                | <i class="fas fa-code"></i> MLP | CNN | Seq2Seq | Hybride | Agent
            </span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
